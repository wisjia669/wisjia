<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест уведомлений</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1a1a1a; 
            padding: 30px; 
            border-radius: 10px; 
            text-align: center; 
        }
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.2rem; 
            border-radius: 5px; 
            cursor: pointer; 
        }
        #status { 
            color: #888; 
            margin-top: 15px; 
            font-size: 0.9rem; 
        }
    </style>
</head>
<body>

<div class="card">
    <button onclick="sendTestNotification()">ОТПРАВИТЬ УВЕДОМЛЕНИЕ</button>
    <div id="status">Нажмите для проверки</div>
</div>

<script>
    function sendTestNotification() {
        const status = document.getElementById('status');

        // Проверка поддержки браузером
        if (!("Notification" in window)) {
            status.innerText = "Браузер не поддерживает уведомления";
            return;
        }

        // Запрос разрешения или отправка, если уже разрешено
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                status.innerText = "Разрешено. Отправка...";
                
                const n = new Notification("Проверка связи", {
                    body: "Это тестовое уведомление на один клик",
                    icon: "https://cdn-icons-png.flaticon.com/512/179/179386.png"
                });

                // Обработчик клика по самому уведомлению (опционально)
                n.onclick = () => {
                    window.focus();
                    n.close();
                };
            } else {
                status.innerText = "Доступ запрещен (Permission Denied)";
            }
        });
    }
</script>

</body>
</html>
